<!DOCTYPE html>
<!-- One-time voice setup. Mic permission granted here belongs to the
     EXTENSION origin, so it covers every website forever — no more
     per-site permission prompts. Opened by background.js when the
     offscreen document reports the permission is missing. -->
<html>
<head>
<meta charset="utf-8">
<title>Enable voice — Accessibility Agent</title>
<style>
  body {
    font-family: -apple-system, sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 90vh;
    gap: 16px;
    text-align: center;
    color: #111827;
  }
  h1 { font-size: 28px; margin: 0; }
  p  { font-size: 18px; color: #6b7280; max-width: 34em; margin: 0; }
  #enable {
    font-size: 20px;
    font-weight: 600;
    padding: 14px 32px;
    border: none;
    border-radius: 10px;
    background: #3B82F6;
    color: white;
    cursor: pointer;
  }
  #enable:hover { background: #2563eb; }
  #result { font-size: 18px; min-height: 1.5em; }
</style>
</head>
<body>
  <h1>🤖 Turn on voice</h1>
  <p>Click the button below, then choose <b>Allow</b> when your browser asks
     about the microphone. You only need to do this once — after that, voice
     works on every website.</p>
  <button id="enable">🎤 Turn on voice</button>
  <p id="result"></p>
  <script src="permission.js"></script>
</body>
</html>
